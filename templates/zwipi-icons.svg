<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 0 0" width="0" height="0" style="display:none">
  <defs>

    <!-- HOME -->
    <symbol id="icon-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1H15v-5h-6v5H4a1 1 0 0 1-1-1V10.5z"/>
    </symbol>

    <!-- PROFILE -->
    <symbol id="icon-profile" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="8" r="4"/>
      <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
    </symbol>

    <!-- WITHDRAW -->
    <symbol id="icon-withdraw" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="5" width="20" height="14" rx="2"/>
      <path d="M2 10h20"/>
      <path d="M12 15v3m0 0l-2-2m2 2l2-2"/>
    </symbol>

    <!-- DEPOSIT -->
    <symbol id="icon-deposit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="5" width="20" height="14" rx="2"/>
      <path d="M2 10h20"/>
      <path d="M12 18v-3m0 0l-2 2m2-2l2 2"/>
    </symbol>

    <!-- LOGOUT -->
    <symbol id="icon-logout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </symbol>

    <!-- EMAIL -->
    <symbol id="icon-email" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <polyline points="2,4 12,13 22,4"/>
    </symbol>

    <!-- PASSWORD -->
    <symbol id="icon-password" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="11" width="14" height="10" rx="2"/>
      <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
      <circle cx="12" cy="16" r="1.2" fill="currentColor" stroke="none"/>
    </symbol>

    <!-- CELL / PHONE -->
    <symbol id="icon-cell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="6" y="2" width="12" height="20" rx="3"/>
      <circle cx="12" cy="18" r="0.8" fill="currentColor" stroke="none"/>
    </symbol>

    <!-- GENDER -->
    <symbol id="icon-gender" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="10" cy="14" r="4"/>
      <path d="M14 10l6-6"/>
      <path d="M20 4h-4m4 0v4"/>
      <path d="M10 18v3"/>
      <path d="M8 21h4"/>
    </symbol>

    <!-- NAME (person tag) -->
    <symbol id="icon-name" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="7" r="3.5"/>
      <path d="M5.5 21c0-3.6 2.9-6.5 6.5-6.5s6.5 2.9 6.5 6.5"/>
      <line x1="8" y1="7" x2="16" y2="7" stroke="none"/>
    </symbol>

    <!-- SURNAME (person + line) -->
    <symbol id="icon-surname" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="7" r="3"/>
      <path d="M4 21c0-3 2.2-5.5 5-5.5"/>
      <path d="M15 12h5m-5 4h5m-5 4h3"/>
    </symbol>

    <!-- ID CARD -->
    <symbol id="icon-id" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="6" width="20" height="12" rx="2"/>
      <circle cx="8" cy="12" r="2.5"/>
      <line x1="13" y1="10" x2="19" y2="10"/>
      <line x1="13" y1="14" x2="17" y2="14"/>
    </symbol>

    <!-- AGE / CALENDAR -->
    <symbol id="icon-age" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="5" width="18" height="16" rx="2"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
      <line x1="8" y1="3" x2="8" y2="7"/>
      <line x1="16" y1="3" x2="16" y2="7"/>
      <text x="12" y="18" font-size="6" text-anchor="middle" stroke="none" fill="currentColor" font-family="sans-serif" font-weight="bold">18+</text>
    </symbol>

  </defs>
</svg>
